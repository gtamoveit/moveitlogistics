<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move It Logistics - Track Your Container</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <svg class="logo" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
                <!-- Black "moveit" text -->
                <text x="80" y="280" font-size="220" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#000">moveit</text>
                
                <!-- Yellow circle with arrow in "o" -->
                <circle cx="340" cy="220" r="90" fill="none" stroke="#FFD700" stroke-width="45"/>
                <polygon points="340,110 420,210 260,210" fill="#FFD700"/>
                
                <!-- Yellow plus sign -->
                <rect x="950" y="90" width="50" height="150" fill="#FFD700" rx="5"/>
                <rect x="900" y="140" width="150" height="50" fill="#FFD700" rx="5"/>
                
                <!-- "LOGISTICS" text below -->
                <text x="300" y="360" font-size="70" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#000" letter-spacing="6">LOGISTICS</text>
            </svg>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1>Track Your Container</h1>
            <p class="subtitle">Enter your container number to view real-time tracking information</p>

            <!-- Search Form -->
            <div class="search-section">
                <input 
                    type="text" 
                    id="containerInput" 
                    class="search-input" 
                    placeholder="e.g., SITU2646830"
                    autocomplete="off"
                >
                <button id="trackBtn" class="track-button">Track</button>
            </div>

            <!-- Loading State -->
            <div id="loading" class="loading" style="display: none;">
                <p>Searching for container...</p>
            </div>

            <!-- Error State -->
            <div id="error" class="error" style="display: none;">
                <p id="errorMessage"></p>
            </div>

            <!-- Results Section -->
            <div id="results" class="results" style="display: none;">
                <div class="container-details">
                    <h2>Container Details</h2>
                    
                    <div class="detail-item">
                        <label>CONTAINER ID</label>
                        <p id="containerId" class="detail-value">-</p>
                    </div>

                    <div class="details-grid">
                        <div class="detail-card">
                            <label>STATUS</label>
                            <p id="status" class="status-badge">-</p>
                        </div>
                        <div class="detail-card">
                            <label>VEHICLE NUMBER</label>
                            <p id="vehicleNumber" class="detail-value">-</p>
                        </div>
                        <div class="detail-card">
                            <label>DRIVER NAME</label>
                            <p id="driverName" class="detail-value">-</p>
                        </div>
                        <div class="detail-card">
                            <label>VEHICLE TYPE</label>
                            <p id="vehicleType" class="detail-value">-</p>
                        </div>
                    </div>
                </div>

                <button id="newSearchBtn" class="new-search-button">New Search</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
